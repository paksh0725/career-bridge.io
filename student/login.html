<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Bridge - 로그인</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI','Malgun Gothic',sans-serif; background:#EFF6FF; min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.back-link { position:fixed; top:20px; left:24px; font-size:13px; color:#2563EB; cursor:pointer; font-weight:600; }
.back-link:hover { text-decoration:underline; }
.wrap { width:100%; max-width:400px; padding:20px; }
.logo-area { text-align:center; margin-bottom:28px; }
.logo-mark { display:inline-flex; align-items:center; justify-content:center; width:52px; height:52px; background:#2563EB; border-radius:14px; margin-bottom:13px; }
.logo-mark svg { width:26px; height:26px; fill:white; }
.logo-title { font-size:22px; font-weight:800; color:#1E3A5F; letter-spacing:-0.4px; }
.logo-sub { font-size:12px; color:#476E8A; margin-top:4px; }
.card { background:white; border-radius:18px; padding:32px; box-shadow:0 4px 20px rgba(37,99,235,0.09); border:1px solid #BFDBFE; }
.card h2 { font-size:17px; font-weight:700; color:#1E3A5F; text-align:center; margin-bottom:5px; }
.card > p { font-size:12px; color:#476E8A; text-align:center; margin-bottom:24px; }
.fg { margin-bottom:13px; }
.fg label { display:block; font-size:11px; font-weight:700; color:#2563EB; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.4px; }
.fg input { width:100%; padding:10px 13px; border:1.5px solid #BFDBFE; border-radius:8px; font-size:14px; color:#1E3A5F; background:#EFF6FF; outline:none; transition:border-color 0.14s; }
.fg input:focus { border-color:#2563EB; background:white; }
.login-btn { width:100%; padding:12px; background:#2563EB; color:white; border:none; border-radius:9px; font-size:14px; font-weight:700; cursor:pointer; margin-top:4px; transition:background 0.14s; }
.login-btn:hover { background:#1D4ED8; }
.signup-row { text-align:center; margin-top:16px; font-size:12px; color:#476E8A; }
.signup-row a { color:#2563EB; font-weight:600; cursor:pointer; }
.portal-row { text-align:center; margin-top:10px; padding-top:14px; border-top:1px solid #DBEAFE; font-size:12px; color:#476E8A; }
.portal-row a { color:#2563EB; font-weight:600; cursor:pointer; }

/* Large screen layout guard */
@media (min-width: 1200px) {
  body { overflow-x:hidden; }
  .nav { padding-left:clamp(48px, 5vw, 72px); padding-right:clamp(48px, 5vw, 72px); }
  .hero, .section, .users-section, .stats-section, .cta-section { padding-left:64px; padding-right:64px; }
  .hero-inner, .section-inner, .users-grid, .stats-grid { max-width:1180px; }
  .hero .hero-inner[style] { max-width:840px !important; }
  .hero h1 { font-size:44px; line-height:1.18; }
  .section-title, .cta-section h2 { font-size:30px; line-height:1.28; }
  .section-desc, .hero p { max-width:640px; }
  .features-grid, .users-grid { grid-template-columns:repeat(3, minmax(0, 1fr)); align-items:stretch; }
  .feat-card, .user-card { min-height:100%; }
  .feat-title, .user-card h3, .b-title { line-height:1.35; }
  .btn-primary, .btn-secondary, .cta-btn-white, .cta-btn-outline { min-width:160px; max-width:260px; }
  .banner-slide { padding-left:max(64px, calc((100vw - 1180px) / 2)); padding-right:max(64px, calc((100vw - 1180px) / 2)); }
  .main .content, .content { max-width:1240px; margin-left:auto; margin-right:auto; }
  .profile-card, .stats-row, .info-grid, .company-filter, .company-grid, .doc-grid, .translator, .quick-grid, .pt-grid, .history-card, .msg-layout, .messages-layout { max-width:100%; }
  .company-grid, .doc-grid, .quick-grid { grid-template-columns:repeat(3, minmax(0, 1fr)); align-items:stretch; }
  .stats-row { grid-template-columns:repeat(4, minmax(0, 1fr)); }
  .info-grid, .trans-grid, .comp-detail-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); }
  .company-card, .doc-card, .quick-card, .info-card, .stat-card { min-width:0; }
  .cc-name, .doc-name, .qc-title, .h-title, .tb-title, .profile-info h2, .modal-head h3 { line-height:1.35; }
  .cc-name, .doc-name, .qc-title, .h-title { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .cc-type, .doc-meta, .qc-desc, .h-sub { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
}

@media (min-width: 1600px) {
  .hero, .section, .users-section, .stats-section, .cta-section { padding-left:72px; padding-right:72px; }
  .hero-inner, .section-inner, .users-grid, .stats-grid { max-width:1200px; }
  .main .content, .content { max-width:1280px; }
  .hero h1 { font-size:44px; }
  .section-title, .cta-section h2 { font-size:30px; }
}

/* Demo interaction states */
.demo-toast { position:fixed; right:24px; bottom:24px; z-index:3000; background:#1E3A5F; color:white; border-radius:10px; padding:12px 16px; font-size:13px; font-weight:700; box-shadow:0 10px 30px rgba(30,58,95,0.18); opacity:0; transform:translateY(10px); pointer-events:none; transition:all 0.2s ease; }
.demo-toast.show { opacity:1; transform:translateY(0); }
.demo-state-note { margin-top:10px; padding:10px 12px; border-radius:9px; background:#DBEAFE; color:#1D4ED8; border:1px solid #BFDBFE; font-size:12px; font-weight:700; display:none; }
.demo-state-note.show { display:block; }
.demo-mode-pill { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; background:#DBEAFE; color:#2563EB; font-size:11px; font-weight:800; margin-left:8px; vertical-align:middle; }
.demo-status { display:inline-flex; padding:3px 8px; border-radius:999px; background:#EFF6FF; border:1px solid #BFDBFE; color:#2563EB; font-size:10px; font-weight:800; }

/* Reference-inspired clean light blue theme */

  --cb-blue:#8FB6D9;
  --cb-blue-strong:#4B78AA;
  --cb-blue-dark:#2F5F95;
  --cb-blue-pale:#EEF6FD;
  --cb-shadow:0 10px 30px rgba(86, 132, 176, 0.11);
}
body { color:var(--cb-ink); background:var(--cb-soft); }

.user-card, .mock-profile, .mock-stat {

}

.sidebar, .cta-section, .bulk-bar, .banner, .modal-head-blue,

/* Material 3 inspired tonal color system */
:root {
  --m3-primary:#5D8FBA;
  --m3-on-primary:#FFFFFF;
  --m3-primary-container:#E4F1FA;
  --m3-on-primary-container:#214762;
  --m3-secondary:#718799;
  --m3-on-secondary:#FFFFFF;
  --m3-secondary-container:#ECF3F8;
  --m3-on-secondary-container:#2E4A5D;
  --m3-tertiary:#6B6F91;
  --m3-on-tertiary:#FFFFFF;
  --m3-tertiary-container:#E7E8F6;
  --m3-on-tertiary-container:#272B49;
  --m3-error:#BA1A1A;
  --m3-on-error:#FFFFFF;
  --m3-error-container:#FFDAD6;
  --m3-on-error-container:#410002;
  --m3-background:#FBFDFF;
  --m3-on-background:#182A38;
  --m3-surface:#FFFFFF;
  --m3-surface-dim:#F3F7FA;
  --m3-surface-container-low:#FAFCFE;
  --m3-surface-container:#F5F9FC;
  --m3-surface-container-high:#EEF5FA;
  --m3-on-surface:#182A38;
  --m3-on-surface-variant:#5D6E7C;
  --m3-outline:#CEDBE5;
  --m3-outline-variant:#E5EDF3;
  --m3-shadow:0 8px 24px rgba(38, 72, 102, 0.10);
  --m3-shadow-strong:0 14px 36px rgba(38, 72, 102, 0.14);
}

<div class="wrap">

    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg></div>

    <div class="logo-sub">외국인 유학생 커리어 플랫폼</div>
  </div>
  <div class="card">
    <h2>로그인</h2>
    <p>이메일과 비밀번호 입력</p>
    <div class="fg"><label>이메일</label><input type="email" placeholder="이메일 주소"></div>
    <div class="fg"><label>비밀번호</label><input type="password" placeholder="비밀번호"></div>
    <button class="login-btn" onclick="window.location.href='student.html'">로그인</button>
    <div class="signup-row">신규 계정 <a onclick="window.location.href='index.html'">회원가입</a></div>
    <div class="portal-row">담당자 계정 <a onclick="window.location.href='institution.html'">기관 담당자</a> · <a onclick="window.location.href='company.html'">기업 담당자</a></div>
  </div>
</div>

<script>
(function(){
  if (window.__careerBridgeDemoPatch) return;
  window.__careerBridgeDemoPatch = true;

  function toast(message) {
    var el = document.getElementById('demoToast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'demoToast';
      el.className = 'demo-toast';
      document.body.appendChild(el);
    }
    el.textContent = message;
    el.classList.add('show');
    clearTimeout(window.__demoToastTimer);
    window.__demoToastTimer = setTimeout(function(){ el.classList.remove('show'); }, 1800);
  }

  function ensureNote(parent, id, text) {
    if (!parent) return;
    var note = document.getElementById(id);
    if (!note) {
      note = document.createElement('div');
      note.id = id;
      note.className = 'demo-state-note';
      parent.appendChild(note);
    }
    note.textContent = text;
    note.classList.add('show');
  }

  window.demoToast = toast;

  var page = location.pathname.split('/').pop() || 'index.html';

  if (page === 'login.html') {
    document.querySelectorAll('button, .login-btn, .role-card').forEach(function(el){
      var text = (el.textContent || '').trim();
      if (!el.dataset.demoBound && text) {
        el.dataset.demoBound = '1';
        el.addEventListener('click', function(){ toast('선택한 사용자 유형의 시연 화면 이동.'); });
      }
    });
  }

  if (page === 'institution.html') {
    var qs = new URLSearchParams(location.search);
    var role = qs.get('role') || 'company';
    var title = document.getElementById('pageTitle');
    if (title && !title.querySelector('.demo-mode-pill')) {
      var pill = document.createElement('span');
      pill.className = 'demo-mode-pill';
      pill.textContent = role === 'school' ? '기관 담당자 모드' : '기업 담당자 모드';
      title.appendChild(pill);
    }
    if (role === 'school') {
      document.querySelectorAll('.sc-btn.secondary, .act-btn.primary, .bulk-btn').forEach(function(btn){
        if ((btn.textContent || '').indexOf('메시지') >= 0 || (btn.textContent || '').indexOf('硫') >= 0) {
          btn.style.opacity = '0.45';
          btn.title = '기관 담당자 시연의 정보 조회 중심 흐름.';
          btn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); toast('기관 담당자 모드의 학생 정보 조회 흐름 시연.'); }, true);
        }
      });
    }
    var oldSearch = window.doSearch;
    window.doSearch = function(){
      if (typeof oldSearch === 'function') oldSearch();
      var box = document.querySelector('.filter-box');
      ensureNote(box, 'searchDemoNote', '필터 조건 적용 후 추천 학생 목록 갱신 상태. 실제 검색 DB 미연결 시연 화면.');
      toast('검색 결과 갱신 완료.');
    };
    var oldDetail = window.openDetailModal;
    window.openDetailModal = function(i){
      if (typeof oldDetail === 'function') oldDetail(i);
      setTimeout(function(){
        var body = document.querySelector('#studentDetailModal .modal-body');
        if (body && !document.getElementById('demoDetailExtra')) {
          var div = document.createElement('div');
          div.id = 'demoDetailExtra';
          div.className = 'detail-sec';
          div.innerHTML = '<h4>관심 분야 / 취업 계획 / 문서</h4><div class="history-mini"><div class="hm-item"><div class="hm-badge cert">관심</div><div><div class="hm-title">글로벌 마케팅, 무역, 콘텐츠 현지화</div><div class="hm-sub">기업 담당자 검토용 핵심 관심 분야</div></div><span class="demo-status">공개</span></div><div class="hm-item"><div class="hm-badge work">계획</div><div><div class="hm-title">2025년 하반기 국내 취업 희망</div><div class="hm-sub">E-7 비자 전환 및 장기 정주 의사 있음</div></div><span class="demo-status">검토</span></div><div class="hm-item"><div class="hm-badge edu">문서</div><div><div class="hm-title">이력서, 자기소개서, 추천서 등록 완료</div><div class="hm-sub">실제 파일 업로드 없이 등록 상태만 표현</div></div><span class="demo-status">3건</span></div></div>';
          var actions = body.querySelector('.action-btns');
          body.insertBefore(div, actions || null);
        }
      }, 0);
    };
    var oldSend = window.sendMsg;
    window.sendMsg = function(){ if (typeof oldSend === 'function') oldSend(); toast('메시지 발송 완료 상태가 반영되었습니다.'); };
    var oldBulk = window.sendBulkMsg;
    window.sendBulkMsg = function(){ if (typeof oldBulk === 'function') oldBulk(); toast('선택 학생에게 일괄 메시지를 발송한 상태입니다.'); };
  }

  if (page === 'student.html') {
    document.querySelectorAll('.btn-confirm').forEach(function(btn){
      if (btn.dataset.demoBound) return;
      btn.dataset.demoBound = '1';
      btn.addEventListener('click', function(){
        var txt = (btn.textContent || '').trim();
        if (txt) toast('등록/저장 완료 상태 반영.');
      });
    });
    document.querySelectorAll('.toggle-opt').forEach(function(opt){
      if (opt.dataset.demoBound) return;
      opt.dataset.demoBound = '1';
      opt.addEventListener('click', function(){ toast('공개 범위 변경 완료.'); });
    });
    var oldCompanyMsg = window.openStudentMsgModal;
    window.openStudentMsgModal = function(company){ if (typeof oldCompanyMsg === 'function') oldCompanyMsg(company); toast('기업 담당자 대상 메시지 작성.'); };
  }

  if (page === 'messages.html' || page === 'inst-messages.html' || page === 'company-messages.html') {
    var oldMsg = window.sendMsg;
    window.sendMsg = function(){
      if (typeof oldMsg === 'function') oldMsg();
      toast('메시지 발송 완료. 받은/보낸 메시지 시연 상태.');
    };
    document.querySelectorAll('.i-tab').forEach(function(tab){
      if (tab.dataset.demoBound) return;
      tab.dataset.demoBound = '1';
      tab.addEventListener('click', function(){
        document.querySelectorAll('.i-tab').forEach(function(t){ t.classList.remove('active'); });
        tab.classList.add('active');
        toast((tab.textContent || '메시지함').trim() + ' 목록으로 전환되었습니다.');
      });
    });
  }

  if (page === 'translation.html') {
    document.querySelectorAll('.lang-sw span, .lang-select-btn').forEach(function(btn){
      if (btn.dataset.demoBound) return;
      btn.dataset.demoBound = '1';
      btn.addEventListener('click', function(){
        document.querySelectorAll('.lang-sw span').forEach(function(s){ s.classList.remove('active'); });
        if (btn.parentElement && btn.parentElement.classList.contains('lang-sw')) btn.classList.add('active');
        toast('미리 준비된 다국어 화면으로 전환된 상태입니다.');
      });
    });
  }
})();
</script>
